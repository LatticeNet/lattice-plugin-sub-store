name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - name: checkout lattice-plugin-sub-store
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache-dependency-path: system-go/go.mod
      - name: gofmt
        run: test -z "$(gofmt -l system-go)"
      - name: test
        working-directory: system-go
        run: go test -race -cover ./...
      - name: build linux/amd64 artifact
        working-directory: system-go
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build -trimpath -o /tmp/lattice-plugin-sub-store .
